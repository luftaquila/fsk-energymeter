name: Build Image

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - 'Dockerfile'
      - 'Caddyfile'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=min

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Delete orphaned versions
        uses: actions/github-script@v7
        with:
          script: |
            const image = '${{ github.repository }}';

            // Get referenced digests from current manifest list
            const tokenRes = await fetch(
              `https://ghcr.io/token?service=ghcr.io&scope=repository:${image}:pull`
            );
            const { token } = await tokenRes.json();
            const manifestRes = await fetch(
              `https://ghcr.io/v2/${image}/manifests/latest`,
              {
                headers: {
                  Authorization: `Bearer ${token}`,
                  Accept: 'application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.index.v1+json'
                }
              }
            );
            const manifest = await manifestRes.json();
            const referenced = new Set(manifest.manifests.map(m => m.digest));

            // Delete untagged versions not referenced by manifest list
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser,
              { package_type: 'container', package_name: 'fsk-energymeter' }
            );
            for (const v of versions) {
              if (v.metadata.container.tags.length === 0 && !referenced.has(v.name)) {
                console.log(`Deleting orphaned: ${v.id} (${v.name})`);
                await github.rest.packages.deletePackageVersionForAuthenticatedUser({
                  package_type: 'container',
                  package_name: 'fsk-energymeter',
                  package_version_id: v.id
                });
              }
            }
